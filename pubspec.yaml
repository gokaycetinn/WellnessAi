name: wellness_ai
description: A health and wellness AI coaching application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  firebase_core: ^4.5.0
  firebase_remote_config: ^6.2.0
  firebase_ai: ^3.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  equatable: ^2.0.7
  intl: ^0.19.0
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  phosphor_flutter: ^2.1.0
  flutter_animate: ^4.5.2
  salomon_bottom_bar: ^3.3.2
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: asset/logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - asset/

